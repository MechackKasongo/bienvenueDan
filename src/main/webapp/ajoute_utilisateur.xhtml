<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="jakarta.faces.core">
<head>
    <title>Ajouter un Utilisateur</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        body {
            background-color: #e3f2fd; /* Light blue background */
        }
        .container {
            background-color: #ffffff;
            border-radius: 10px;
            border: 1px solid #1e88e5; /* Blue border */
        }
        .form-label {
            color: #1e88e5; /* Blue label text */
        }
        .form-control {
            border-color: #1e88e5; /* Blue input border */
        }
        .btn-primary {
            background-color: #1e88e5; /* Blue button */
            border-color: #1e88e5; /* Button border color */
        }
        .btn-primary:hover {
            background-color: #1565c0; /* Darker blue on hover */
            border-color: #1565c0; /* Darker border on hover */
        }
        .alert-danger {
            background-color: #f8bbd0; /* Light pink background for error messages */
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

    <div class="container p-4 shadow" style="max-width: 500px;">  <!-- Increased max-width for more space -->
        <h4 class="mb-4 text-center" style="color: #1e88e5;">Ajouter un Utilisateur</h4>

        <h:form>
            <div class="mb-3">
                <h:outputLabel for="username" value="Nom d'utilisateur :" styleClass="form-label"/>
                <h:inputText id="username" value="#{utilisateurBean.username}" required="true"
                             requiredMessage="vous devez ecrire votre nom " styleClass="form-control"/>
                <h:message for="username" style="color: red;" styleClass="form-text"/>
            </div>

            <div class="mb-3">
                <h:outputLabel for="email" value="Email :" styleClass="form-label"/>
                <h:inputText id="email" value="#{utilisateurBean.email}" required="true" 
                             requiredMessage=" vous devez ecrire votre mail" styleClass="form-control"/>
                <h:message for="email" style="color: red;" styleClass="form-text"/>
            </div>

            <div class="mb-3">
                <h:outputLabel for="password" value="Mot de passe :" styleClass="form-label"/>
                <h:inputSecret id="password" value="#{utilisateurBean.password}" required="true" 
                               requiredMessage=" tu dois mettre un mot de passe" styleClass="form-control"/>
                <h:message for="password" style="color: red;" styleClass="form-text"/>
            </div>

            <div class="mb-3">
                <h:outputLabel for="confirmPassword" value="Confirmer le mot de passe :" styleClass="form-label"/>
                <h:inputSecret id="confirmPassword" value="#{utilisateurBean.confirmPassword}" required="true" styleClass="form-control"/>
                <h:message for="confirmPassword" style="color: red;" styleClass="form-text"/>
            </div>

            <div class="mb-3">
                <h:outputLabel for="description" value="Description :" styleClass="form-label"/>
                <h:inputTextarea id="description" value="#{utilisateurBean.description}" 
                                 requiredMessage=" " styleClass="form-control"/>
                <h:message for="description" style="color: red;" styleClass="form-text"/>
            </div>
            
            <h:messages globalOnly="true" style="color: red;" styleClass="alert alert-danger mb-3" />

            <h:commandButton value="Ajouter" action="#{utilisateurBean.ajouterUtilisateur}" styleClass="btn btn-primary w-100"/>
        </h:form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
