<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<head>
    <title>Bienvenue en Indonésien</title>
    
    <!-- Intégration de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-primary"> <!-- Fond bleu -->

    <div class="container text-center p-4 shadow bg-white rounded" style="max-width: 400px;">
        <!-- Drapeau de l'Indonésie avec bordure -->
        <img src="hh.jpg" 
             alt="Drapeau Indonésie" 
             class="img-fluid mb-3 border border-1 border-secondary rounded" 
             style="width: 150px;"/>

        <h4 class="mb-2">Bienvenue en Indonésie</h4>

        <h:form>
            
             <div class="mb-3">
                <h:outputLabel for="email" value="Email :" class="form-label"/>
                <h:inputText id="email" value="#{welcomeBean.email}" class="form-control" required="true" requiredMessage="Entrez votre mail!"/>
                 <h:message for="email" style="color: rgb(198, 101, 53);"/>
            </div>
            
            <div class="mb-3">
                <h:outputLabel for="password" value="Mot de passe :" class="form-label"/>
                <h:inputSecret id="password" value="#{welcomeBean.password}" class="form-control" required="true" requiredMessage="Entrez votre mot de passe!"/>
                <h:message for="password" style="color: rgb(236, 124, 11);"/>
            </div>
            
            <h:messages globalOnly="true" style="color: rgb(218, 108, 17);"/>
            <br/>
            <!-- Bouton unique pour l'authentification -->
            <h:commandButton value="Découvrir" action="#{welcomeBean.sAuthentifier}"
                     styleClass="btn btn-secondary w-100 p-3"/>
         
            
            <h:link value="Créer un compte" outcome="ajoute_utilisateur.xhtml"/>
        </h:form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
